kind = "web"
previewPath = "/"
title = "Kiddie Kingdom Preschool"
version = "1.0.0"
id = "artifacts/kiddie-kingdom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21426

[services.development]
run = "pnpm --filter @workspace/kiddie-kingdom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kiddie-kingdom", "run", "build" ]
publicDir = "artifacts/kiddie-kingdom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21426"
BASE_PATH = "/"
